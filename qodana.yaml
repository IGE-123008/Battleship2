#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

version: "1.0"

# Usamos o perfil vazio para não herdar erros que não nos interessam agora
profile:
  name: empty

# Ativamos APENAS a inspeção pedida na Tarefa 2
include:
  - name: Java.ErrorHandling.PrintStackTrace

# Opcional: ignorar tudo o resto para garantir que o gate é específico
exclude:
  - name: All

projectJDK: "17" # Nota: JDK 25 pode causar erros de compatibilidade no runner atual, 17 ou 21 é mais seguro

# Quality gate: falha se houver PELO MENOS 1 ocorrência do que está no include
failureConditions:
  severityThresholds:
    any: 0

linter: jetbrains/qodana-jvm:2024.3