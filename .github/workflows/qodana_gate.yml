# Tarefa 2: Quality Gate para Code Smell "Calls to printStackTrace"

name: Qodana Quality Gate

on: [push]

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2023.2
        with:
          args: --inspections,Java.ErrorHandling.PrintStackTrace
          # REMOVI A LINHA DO fail-threshold DAQUIspections,Java.ErrorHandling.PrintStackTrace