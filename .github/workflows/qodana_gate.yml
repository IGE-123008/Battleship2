# Tarefa 2: Quality Gate para Code Smell "Calls to printStackTrace"

name: Qodana Quality Gate - Code Maturity

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2023.2
        with:
          # Define o limite de problemas para o Quality Gate falhar
          fail-threshold: 0
          # Argumentos para focar na inspeção de Java e Code Maturity
          args: --inspections,Java.ErrorHandling.PrintStackTrace